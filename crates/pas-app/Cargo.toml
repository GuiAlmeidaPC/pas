[package]
name = "pas-app"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "pas_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
pas-engine = { path = "../pas-engine" }
tauri = { version = "2", features = [] }
