name: Validate

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"
          cache-dependency-path: "ui/pnpm-lock.yaml"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .

      - name: Install system dependencies (Ubuntu only)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: ./ui
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Lint Rust
        run: cargo clippy --workspace -- -D warnings

      - name: Test Rust
        run: cargo test -p pas-engine

      - name: Build frontend
        working-directory: ./ui
        run: pnpm run build

      - name: Test frontend
        working-directory: ./ui
        run: pnpm test

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Rust dependency audit
        # Fails on actual vulnerabilities; known transitive informational
        # advisories are acknowledged in .cargo/audit.toml.
        run: cargo audit

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # No pnpm cache here: this job only runs `pnpm audit` (no install),
          # so the pnpm store is never populated and the cache-save post-step
          # would fail with "Path(s) ... do not exist".

      - name: Frontend dependency audit
        working-directory: ./ui
        run: pnpm audit --audit-level=high
